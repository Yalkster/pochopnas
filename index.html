  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Gottmana, Tannenovej a tisícok statočných dobrovoľníkov<\u002Fdiv>\n<\u002Fheader>\n<div class=\"grid\">\n<div class=\"fx col gap16\" style=\"min-width:0\">\n<section class=\"panel\">\n<div class=\"plabel\">▸ Zachytená fráza<\u002Fdiv>\n<textarea class=\"inp\" placeholder=\"napr. „To je v pohode, rob si čo chceš.“\" value=\"{{ input }}\" onchange=\"{{ onInput }}\" onkeydown=\"{{ onKey }}\"><\u002Ftextarea>\n<div class=\"btnrow\"><button class=\"btn\" onclick=\"{{ onTranslate }}\" disabled=\"{{ busy }}\">⚡ DEŠIFROVAŤ<\u002Fbutton><button class=\"btn ghost\" onclick=\"{{ onRandom }}\" disabled=\"{{ busy }}\">🎲 NÁHODNÁ FRÁZA<\u002Fbutton><\u002Fdiv>\n<sc-if value=\"{{ err }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"err\">⚠ Spojenie s laboratóriom zlyhalo — použitý núdzový archív.<\u002Fdiv><\u002Fsc-if>\n<\u002Fsection>\n<sc-if value=\"{{ busy }}\" hint-placeholder-val=\"{{ false }}\"><section class=\"panel\"><div class=\"plabel\">▸ Analýza prebieha<\u002Fdiv><div class=\"loadln\">{{ loadLine }}<span class=\"blink\">_<\u002Fspan><\u002Fdiv><\u002Fsection><\u002Fsc-if>\n<sc-if value=\"{{ hasResult }}\" hint-placeholder-val=\"{{ true }}\"><section class=\"panel\" data-screen-label=\"Výsledok\">\n<div class=\"plabel\">▸ Dešifrovaný výstup<\u002Fdiv>\n<div class=\"orig\">VSTUP: „{{ rFraza }}“<\u002Fdiv>\n<div class=\"preklad\">{{ rPreklad }}<\u002Fdiv>\n<div class=\"sect\"><div class=\"plabel m0\">▸ Úroveň ohrozenia<\u002Fdiv><div class=\"meter\"><sc-for list=\"{{ segs }}\" as=\"s\" hint-placeholder-count=\"5\"><div class=\"seg {{ s.cls }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv><div class=\"dlabel\" style=\"color:{{ dColor }}\">DEFCON {{ rDefcon }} — {{ rDefconLabel }}<\u002Fdiv><\u002Fdiv>\n<div class=\"sect\"><div class=\"plabel m0\">▸ <span class=\"cy\">Odporúčaná stratégia prežitia<\u002Fspan><\u002Fdiv><div class=\"odp\">{{ rOdporucanie }}<\u002Fdiv><\u002Fdiv>\n<details class=\"src\"><summary>▸ Zdroje a odborné opory ({{ srcCount }}) — kliknite pre rozbalenie<\u002Fsummary><sc-for list=\"{{ rZdroje }}\" as=\"z\" hint-placeholder-count=\"2\"><div class=\"srcitem\"><span class=\"srcname\">{{ z.nazov }}<\u002Fspan> — {{ z.poznamka }}<\u002Fdiv><\u002Fsc-for><\u002Fdetails>\n<\u002Fsection><\u002Fsc-if>\n<\u002Fdiv>\n<aside class=\"panel\" data-screen-label=\"História\">\n<div class=\"plabel\">▸ Archív dešifrovaní<\u002Fdiv>\n<sc-if value=\"{{ hasHistory }}\" hint-placeholder-val=\"{{ true }}\"><div><sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"3\"><div class=\"hitem\" onclick=\"{{ h.load }}\"><div class=\"hfraza\">„{{ h.fraza }}“<\u002Fdiv><div class=\"hmeta\">DEFCON {{ h.defcon }} · {{ h.cas }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-if>\n<sc-if value=\"{{ noHistory }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"empty\">Archív je prázdny.<br>Zatiaľ žiadne zachytené frázy — šťastie praje pripraveným.<\u002Fdiv><\u002Fsc-if>\n<\u002Faside>\n<\u002Fdiv>\n<footer class=\"foot\">Satirický projekt s láskou. Skutočne overená dešifrovacia metóda podľa všetkých citovaných odborníkov: opýtať sa jej a počúvať. ♥<\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#ffd75c&quot;,&quot;options&quot;:[&quot;#3dff8b&quot;,&quot;#5cd6ff&quot;,&quot;#ff5c8a&quot;,&quot;#ffd75c&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Vzhľad&quot;},&quot;scanlines&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Vzhľad&quot;},&quot;humor&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;jemný&quot;,&quot;suchý vedecký&quot;,&quot;dramatický&quot;],&quot;default&quot;:&quot;jemný&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Správanie&quot;}}\">\nclass Component extends DCLogic {\n  state = { input: '', busy: false, step: 0, result: null, history: [], err: false };\n\n  PHRASES = [\n    'To je v pohode.',\n    'Rob si čo chceš.',\n    'Nič mi nie je.',\n    'O päť minút som hotová.',\n    'Nemusíš mi nič kupovať.',\n    'Všimol si si na mne niečo?',\n    'Musíme sa porozprávať.',\n    'Kto ti to písal?',\n    'Ako sa volala tá tvoja kolegyňa?',\n    'Ja už nič nepoviem.',\n    'Sadni si, ak chceš.',\n    'Fajn.'\n  ];\n\n  STEPS = [\n    '> analyzujem tón a mikropauzy...',\n    '> skenujem kontext posledných 72 hodín...',\n    '> konzultujem Gottmanov inštitút...',\n    '> počítam index skutočnej pohody...',\n    '> krížovo overujem s Tannenovej korpusom...',\n    '> generujem stratégiu prežitia...'\n  ];\n\n  FALLBACK = {\n    preklad: 'Núdzový archív hlási: fráza nesie viac významových vrstiev, než sa na prvý pohľad zdá. Slová hovoria jedno, tón a kontext druhé — a práve tie sú správna odpoveď.',\n    defcon: 3,\n    defconLabel: 'ZVÝŠENÁ OSTRAŽITOSŤ',\n    odporucanie: 'Odlož telefón, otoč sa k nej celým telom a povedz: „Poď mi o tom povedať viac.“ Potom naozaj počúvaj. Účinnosť overená naprieč všetkými štúdiami.',\n    zdroje: [\n      { nazov: 'John Gottman — The Seven Principles for Making Marriage Work', poznamka: 'Gottmanov výskum: kľúčom nie je dekódovanie, ale reagovanie na „bids for connection“ — drobné pokusy o kontakt.' },\n      { nazov: 'Deborah Tannen — You Just Don\\'t Understand', poznamka: 'Lingvistka Tannen: ženy častejšie komunikujú vzťahovú rovinu („rapport talk“), muži informačnú („report talk“).' }\n    ]\n  };\n\n  DB = [\n    { k: ['v pohode', 'to je ok', 'to je fajn', 'pohoda'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Systém hlási inverzný význam: situácia v pohode s vysokou pravdepodobnosťou nie je. Fráza je test, či vám záleží natoľko, aby ste sa pýtali ďalej — Gottman by povedal „bid for connection“ v maskovacom režime.', odp: 'Nechoďte preč a neberte to doslovne. Jemne skúste: „Mne sa zdá, že to celkom v pohode nie je — chceš mi o tom povedať viac?“ A potom počúvajte.', zdroje: [{ nazov: 'John Gottman — The Seven Principles for Making Marriage Work', poznamka: 'Drobné „bids for connection“ často prichádzajú zamaskované; rozhoduje, či sa k nim otočíte.' }, { nazov: 'Deborah Tannen — You Just Don\\'t Understand', poznamka: 'Nepriama komunikácia chráni vzťahovú rovinu — doslovný výklad ju míňa.' }] },\n    { k: ['rob si co chces'], defcon: 1, label: 'KRITICKÝ STAV', preklad: 'POZOR: toto nie je povolenie, ale skúška charakteru v priamom prenose. Preklad znie: „Dúfam, že to neurobíš, a práve zisťujem, či na to prídeš sám.“', odp: 'Neurobte to. Namiesto toho: „Radšej by som to vymyslel s tebou — čo by ti sadlo?“ Kvety samotné situáciu neriešia, ale neuškodia.', zdroje: [{ nazov: 'Harriet Lerner — The Dance of Anger', poznamka: 'Zdanlivé stiahnutie sa býva výrazom nevypovedaného hnevu, nie súhlasu.' }, { nazov: 'John Gottman — výskum „harsh startup“', poznamka: 'Konflikt sa dá odvrátiť mäkkým otvorením rozhovoru namiesto testovania hraníc.' }] },\n    { k: ['nic mi nie je', 'nic sa nedeje', 'nic sa nestalo'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Dešifrované: niečo mi je, ale chcem vidieť, či ti stojím za druhú otázku. Prvé „nič“ je vstupná brána; skutočná odpoveď sa nachádza za ňou.', odp: 'Položte druhú, pokojnú otázku a vydržte ticho: „Vidím, že niečo visí vo vzduchu. Som tu, keď budeš chcieť.“ Netlačte, neodchádzajte.', zdroje: [{ nazov: 'Sue Johnson — Hold Me Tight (EFT)', poznamka: 'Za „nič“ býva vzťahová otázka: „Si tu pre mňa, keď na tom záleží?“' }, { nazov: 'Paul Watzlawick — Pragmatika ľudskej komunikácie', poznamka: 'Nemožno nekomunikovať — aj „nič“ je správa.' }] },\n    { k: ['pat minut', '5 minut', 'som hotova', 'hned som'], defcon: 4, label: 'POZORNOSŤ', preklad: 'Jednotka času „5 minút“ tu nepodlieha SI sústave. Ide o vyjadrenie zámeru, nie odhad — reálna hodnota sa pohybuje v intervale 15–40 minút podľa zložitosti operácie.', odp: 'Neodpočítavajte nahlas. Sadnite si, dajte si kávu a pri odchode povedzte, že vyzerá skvele — pretože bude.', zdroje: [{ nazov: 'Daniel Kahneman — Thinking, Fast and Slow', poznamka: 'Planning fallacy: ľudia systematicky podceňujú trvanie vlastných úloh — všetci, nielen ženy.' }, { nazov: 'Gary Chapman — 5 jazykov lásky', poznamka: 'Trpezlivé čakanie bez frflania je „acts of service“ v praxi.' }] },\n    { k: ['nemusis mi nic kupovat', 'nic mi nekupuj', 'nechcem darcek'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Preklad: „Nemusíš — ale ak nič nedonesieš, zapíše sa to do trvalého záznamu.“ Nejde o predmet, ale o dôkaz, že ste mysleli na ňu, keď nemuseli.', odp: 'Malý, osobný, premyslený darček > drahý generický. Kartička s vlastnoručným textom má vyššiu dešifrovaciu hodnotu než šperk bez kontextu.', zdroje: [{ nazov: 'Gary Chapman — 5 jazykov lásky', poznamka: 'Pri jazyku „prijímanie darov“ je darček symbol pozornosti, nie tovar.' }, { nazov: 'John Gottman — Love Maps', poznamka: 'Poznať jej drobné preferencie je merateľný prediktor spokojnosti vzťahu.' }] },\n    { k: ['vsimol si si', 'nieco ine', 'nieco nove'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Spustený vizuálny kvíz s časovým limitom. Niečo sa zmenilo (vlasy, obočie, výnimočne aj gauč) a systém očakáva detekciu do 5 sekúnd.', odp: 'Nehádajte konkrétnu položku naslepo. Bezpečný protokol: „Niečo je inak a pristane ti to — povedz mi, nech si to vychutnám naplno.“ Úprimnosť + záujem > falošná istota.', zdroje: [{ nazov: 'John Gottman — Love Maps', poznamka: 'Aktualizovaná „mapa lásky“ znamená všímať si, čo sa v jej svete mení.' }, { nazov: 'Deborah Tannen — rapport talk', poznamka: 'Otázka nie je skúška zraku, ale pozvánka k pozornosti.' }] },\n    { k: ['musime sa porozpravat'], defcon: 1, label: 'KRITICKÝ STAV', preklad: 'Najvyšší stupeň pohotovosti. Dobrá správa: nechce sa hádať, chce byť vypočutá. Zlá správa: odloženie rozhovoru zvyšuje závažnosť o jeden stupeň za deň.', odp: 'Neutekajte a nebráňte sa vopred. „Dobre, poďme na to. Chcem ťa naozaj počuť.“ Telefón lícom dole, oči hore. Počúvajte na porozumenie, nie na odpoveď.', zdroje: [{ nazov: 'John Gottman — 4 jazdci apokalypsy', poznamka: 'Obrana a stonewalling rozhovor potopia; otvorenosť ho zachráni.' }, { nazov: 'Sue Johnson — Hold Me Tight', poznamka: 'Pod ťažkými rozhovormi je väčšinou otázka bezpečia a blízkosti.' }] },\n    { k: ['kto ti to pisal', 'kto ti pise', 'kolegyna'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Dopyt nie je o identite odosielateľa, ale o uistení. Preklad: „Potrebujem vedieť, že som tvoja priorita a nemáš predo mnou zatvorené dvere.“', odp: 'Transparentnosť bez obranného tónu: pokojne povedzte kto a prečo, bez prevracania očí. Obrana signalizuje dym aj tam, kde nehorí.', zdroje: [{ nazov: 'Sue Johnson — EFT', poznamka: 'Žiarlivosť je attachmentový poplach — upokojí ho dostupnosť, nie argumenty.' }, { nazov: 'John Gottman — budovanie dôvery', poznamka: 'Dôvera sa stavia z malých momentov transparentnosti, „sliding door moments“.' }] },\n    { k: ['uz nic nepoviem', 'uz mlcim', 'nechaj tak'], defcon: 1, label: 'KRITICKÝ STAV', preklad: 'Ticho v tomto režime nie je koniec konverzácie, ale jej najhlasnejšia časť. Preklad: „Povedala som toho veľa a mám pocit, že to nedoletelo.“', odp: 'Nezneužite ticho na únik k televízoru. Skúste: „Nechcem, aby to takto skončilo. Povedz mi to ešte raz, budem len počúvať.“', zdroje: [{ nazov: 'John Gottman — stonewalling', poznamka: 'Stiahnutie sa je často zaplavenie emóciami (flooding), nie ľahostajnosť.' }, { nazov: 'Harriet Lerner — The Dance of Anger', poznamka: 'Ticho býva posledná forma protestu, keď slová opakovane nezabrali.' }] },\n    { k: ['ak chces', 'sadni si ak chces', 'ako chces'], defcon: 3, label: 'ZVÝŠENÁ OSTRAŽITOSŤ', preklad: 'Podmienka „ak chceš“ je diplomatická obálka pre „očakávam, že chceš“. Systém odporúča interpretovať ako priateľský rozkaz.', odp: 'Chcite. A doplňte bonusový bod: „Jasné, rád — aj tak som chcel byť s tebou.“', zdroje: [{ nazov: 'Deborah Tannen — nepriame žiadosti', poznamka: 'Nepriamosť zjemňuje žiadosť a chráni obe strany pred odmietnutím.' }, { nazov: 'Paul Watzlawick — vzťahová rovina správy', poznamka: 'Obsah je „sadni si“, vzťah je „chcem ťa pri sebe“.' }] },\n    { k: ['fajn', 'dobre teda', 'okej'], defcon: 2, label: 'VYSOKÉ RIZIKO', preklad: 'Jednoslovné „fajn“ s klesavou intonáciou je diplomatická nóta. Rozhovor sa formálne skončil, obsahovo sa práve začal.', odp: 'Nepovažujte „fajn“ za podpísanú dohodu. O chvíľu sa vráťte s: „To predtým... poďme si to povedať celé, zaujíma ma to.“', zdroje: [{ nazov: 'John Gottman — repair attempts', poznamka: 'Návrat ku konfliktu s opravným pokusom je najsilnejší prediktor stabilného vzťahu.' }, { nazov: 'Deborah Tannen — metasprávy', poznamka: 'Krátkosť odpovede je metaspráva; dôležité je, čo obaľuje.' }] }\n  ];\n\n  norm(t) { return t.toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, ''); }\n  offlineLookup(fraza) {\n    const n = this.norm(fraza);\n    const hit = this.DB.find(e => e.k.some(k => n.includes(k)));\n    if (!hit) return null;\n    return { preklad: hit.preklad, defcon: hit.defcon, defconLabel: hit.label, odporucanie: hit.odp, zdroje: hit.zdroje };\n  }\n\n  componentDidMount() {\n    try { const h = JSON.parse(localStorage.getItem('pzc_history') || '[]'); if (Array.isArray(h)) this.setState({ history: h }); } catch (e) {}\n    this.applyAccent();\n  }\n  componentDidUpdate() { this.applyAccent(); }\n  applyAccent() { document.documentElement.style.setProperty('--acc', this.props.accentColor ?? '#3dff8b'); }\n\n  saveHistory(entry) {\n    const history = [entry, ...this.state.history].slice(0, 12);\n    this.setState({ history });\n    try { localStorage.setItem('pzc_history', JSON.stringify(history)); } catch (e) {}\n  }\n\n  parseJson(text) {\n    const m = text.match(/\\{[\\s\\S]*\\}/);\n    return JSON.parse(m ? m[0] : text);\n  }\n\n  async translate(fraza) {\n    if (!fraza || !fraza.trim() || this.state.busy) return;\n    fraza = fraza.trim();\n    this.setState({ busy: true, err: false, result: null, step: 0, input: fraza });\n    this._timer = setInterval(() => this.setState(s => ({ step: (s.step + 1) % this.STEPS.length })), 900);\n    let r;\n    const hasApi = typeof window.claude !== 'undefined' && window.claude && typeof window.claude.complete === 'function';\n    try {\n      if (!hasApi) {\n        await new Promise(res => setTimeout(res, 2400));\n        r = this.offlineLookup(fraza);\n        if (!r) { r = { ...this.FALLBACK }; this.setState({ err: true }); }\n        clearInterval(this._timer);\n        r = { ...r, fraza };\n        this.setState({ busy: false, result: r });\n        this.saveHistory({ fraza, defcon: r.defcon, cas: new Date().toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' }), result: r });\n        return;\n      }\n      const tone = this.props.humor ?? 'jemný';\n      const text = await window.claude.complete({\n        max_tokens: 1200,\n        system: 'Si „Prekladač ženského chápania“ — satirický, ale láskavý a rešpektujúci nástroj v slovenčine. Humor je ' + tone + ', nikdy ponižujúci ani stereotypne zlomyseľný; vtip stojí na univerzálnych vzťahových situáciách a pointa vždy smeruje k lepšej komunikácii a počúvaniu. Opieraš sa o reálne poznatky: John Gottman (bids for connection, 4 jazdci apokalypsy), Deborah Tannen (rapport vs. report talk), Gary Chapman (jazyky lásky), Harriet Lerner, Sue Johnson (EFT), aktívne počúvanie. Odpovedz VÝHRADNE validným JSON bez markdown: {\"preklad\": string (2-4 vety, čo fráza pravdepodobne znamená, vtipne ale s reálnym psychologickým jadrom), \"defcon\": number 1-5 (5=úplný pokoj, 1=kritický stav), \"defconLabel\": string (krátky slovenský popis úrovne, VEĽKÝMI PÍSMENAMI), \"odporucanie\": string (2-3 vety, konkrétna láskavá stratégia ako reagovať), \"zdroje\": [2-3 × {\"nazov\": string (reálny autor/kniha/inštitút), \"poznamka\": string (1 veta, ako sa poznatok viaže na frázu)}]}',\n        messages: [{ role: 'user', content: 'Zachytená fráza: „' + fraza + '“' }]\n      });\n      r = this.parseJson(text);\n      if (!r.preklad || !r.defcon) throw new Error('bad shape');\n      r.defcon = Math.min(5, Math.max(1, Math.round(r.defcon)));\n      if (!Array.isArray(r.zdroje)) r.zdroje = this.FALLBACK.zdroje;\n    } catch (e) {\n      r = { ...this.FALLBACK };\n      this.setState({ err: true });\n    }\n    clearInterval(this._timer);\n    r.fraza = fraza;\n    this.setState({ busy: false, result: r });\n    this.saveHistory({ fraza, defcon: r.defcon, cas: new Date().toLocaleTimeString('sk-SK', { hour: '2-digit', minute: '2-digit' }), result: r });\n  }\n\n  componentWillUnmount() { clearInterval(this._timer); }\n\n  renderVals() {\n    const s = this.state, r = s.result;\n    const sev = r ? 6 - r.defcon : 0;\n    const dColors = { 1: '#3dff8b', 2: '#c8ff5c', 3: '#ffd75c', 4: '#ff9a3d', 5: '#ff4d6d' };\n    return {\n      input: s.input,\n      busy: s.busy,\n      err: s.err,\n      scanOn: this.props.scanlines ?? true,\n      loadLine: this.STEPS[s.step],\n      hasResult: !!r && !s.busy,\n      rFraza: r ? r.fraza : '',\n      rPreklad: r ? r.preklad : '',\n      rDefcon: r ? r.defcon : '',\n      rDefconLabel: r ? (r.defconLabel || '') : '',\n      rOdporucanie: r ? r.odporucanie : '',\n      rZdroje: r ? r.zdroje : [],\n      srcCount: r ? r.zdroje.length : 0,\n      segs: [1, 2, 3, 4, 5].map(i => ({ cls: i <= sev ? 'on' + sev : '' })),\n      dColor: dColors[sev] || '#c8ffd9',\n      history: s.history.map(h => ({ ...h, load: () => { if (h.result) this.setState({ result: h.result, input: h.fraza, err: false }); else this.translate(h.fraza); } })),\n      hasHistory: s.history.length > 0,\n      noHistory: s.history.length === 0,\n      onInput: (e) => this.setState({ input: e.target.value }),\n      onKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.translate(this.state.input); } },\n      onTranslate: () => this.translate(this.state.input),\n      onRandom: () => this.translate(this.PHRASES[Math.floor(Math.random() * this.PHRASES.length)])\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
